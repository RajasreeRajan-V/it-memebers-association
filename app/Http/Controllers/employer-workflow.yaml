             7: VIEW APPLICATIONS & HIRE

Employer Opens Applications
        │
        ▼
View
- Student Applications (who applied for internships)
- Employee Applications (who applied for jobs)
- Freelancer Bids (who submitted bids for outsourced projects)
        │
        ▼
Review Resume / Portfolio
        │
        ▼
Shortlist (If an applicant matches the requirements, the employer clicks Shortlist.
The applicant receives a notification such as:
"Congratulations! You have been shortlisted for the next stage.")
        │
        ▼
Schedule Interview / Discussion (For Students & Employees: An interview (online or offline).)
        │
        ▼
Select Candidate (After the interview or discussion, the employer makes a decision.
                  Select the best student for the internship.
                  Select the best employee for the job.
                  Select the best freelancer for the project.)
        │
        ▼
Hire Candidate / Select Freelancer (The employer confirms the selection.
                                    Student → Internship offered.
                                    Employee → Job offered.
                                    Freelancer → Project assigned)
        │
        ▼
Notification Sent : The system automatically notifies the selected person.
                "Congratulations! You have been selected for the Software Developer position."
                "Congratulations! You have been selected for the internship."
                "Your bid has been accepted. The project has been assigned to you."

        Applicants who are not selected may receive:

        Thank you for your interest. We encourage you to apply for future opportunities.
        Thank you for your application. We wish you success and hope to connect with you again soon.
        Your application has been reviewed. We appreciate your interest and wish you the very best.
        Thank you for applying. We look forward to receiving your application for future openings.
        We appreciate your time and interest. We hope to see you apply again in the future.
        Thank you for your application. We wish you all the best in your career journey.
    │
    ▼
Recruitment Completed :-  
        The job or internship can be marked as Closed.
        The freelancer begins working on the assigned project.
        The selected applicant can view the new status in My Applications..





